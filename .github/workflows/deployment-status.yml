name: Record Render deployment

# Render auto-deploys main but does not post GitHub deployment statuses,
# so this workflow records one to make the demo visible in the
# Deployments sidebar. Cosmetic only: it does not wait for Render's
# actual deploy to finish.

on:
  push:
    branches: [main]

permissions:
  deployments: write

jobs:
  record-deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const environmentUrl = "https://subscriptions-dcwg.onrender.com";

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: [],
              description: "Render auto-deploy",
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: "success",
              environment_url: environmentUrl,
              description: "Deployed to Render",
            });
